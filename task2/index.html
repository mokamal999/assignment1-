<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <aside class="box">
          <h1>Let's Chat</h1>
          <p>
            Whether you have a question, want to<br />
            start a project or simply want to connect.
          </p>
          <p>
            Feel free to send me a message in the<br />
            contact form
          </p>
        </aside><main class="box">
          <h1>Contact</h1>
          <form action="">
            <p class="required">*Required</p>
            <input type="text" placeholder="Name *" /><br />
            <input type="email" placeholder="Email *" /><br />
            <input type="text" placeholder="Company" /><br />
            <input type="tel" placeholder="Phone" /><br />
            <textarea name="" id="" placeholder="Message"></textarea><br />
            <button type="submit">SUBMIT</button>
          </form>
        </main>
      </div>
    </header>
  </body>
</html>
